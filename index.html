<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'HA Курьер</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            text-align: center;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .info:last-child {
            border-bottom: none;
        }

        .info strong {
            font-size: 16px;
            color: #555;
            margin-right: 6px;
        }

        .info span {
            font-size: 16px;
            color: #000;
            word-break: break-word;
            max-width: 60%;
            text-align: left;
        }

        .copy-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:active {
            background: #0056b3;
        }

        .copy-all-btn {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .copy-all-btn:active {
            background: #1e7e34;
        }
        .call-btn {
    background: #28a745;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.call-btn:active {
    background: #1e7e34;
}

        .notification {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #05060578;
            color: rgb(255, 255, 255);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
            visibility: visible;
        }
        .whatsapp-btn {
    background: #25D366;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.whatsapp-btn:active {
    background: #1ebe5d;
}
    </style>
    <script>
        function getQueryParameter(name) {
            const url = window.location.href;
            name = name.replace(/[\[\]]/g, '\\$&');
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            const results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        function decodeFromBase64(encoded) {
            return decodeURIComponent(atob(encoded).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        function copyToClipboard(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => {
                showNotification("Скопировано: " + text);
            });
        }
        function callPhone(id) {
    const phone = document.getElementById(id).textContent.trim();
    if (!phone || phone === "Не указано") return;

    // убираем пробелы и лишние символы
    const cleaned = phone.replace(/[^\d+]/g, '');
    window.location.href = `tel:${cleaned}`;
}

        function copyAll() {
            const order = document.getElementById("decoded-order-number").textContent;
            const name = document.getElementById("decoded-name").textContent;
            const phone = document.getElementById("decoded-phone").textContent;
            const address = document.getElementById("decoded-adress").textContent;

            const fullText = `Номер заказа: ${order}\nИмя: ${name}\nНомер: ${phone}\nАдрес: ${address}`;
            navigator.clipboard.writeText(fullText).then(() => {
                showNotification("Все данные скопированы!");
            });
        }

        function showNotification(message) {
            const notification = document.getElementById("notification");
            notification.textContent = message;
            notification.classList.add("show");

            // Скрыть уведомление через 3 секунды
            setTimeout(() => {
                notification.classList.remove("show");
            }, 4000);
        }

        window.onload = function() {
            const order_number = getQueryParameter("o");
            const name = getQueryParameter("n");
            const phone = getQueryParameter("p");
            const adress = getQueryParameter("a");

            document.getElementById("decoded-order-number").textContent = order_number ? decodeFromBase64(order_number) : "Не указано";
            document.getElementById("decoded-name").textContent = name ? decodeFromBase64(name) : "Не указано";
            document.getElementById("decoded-phone").textContent = phone ? decodeFromBase64(phone) : "Не указано";
            document.getElementById("decoded-adress").textContent = adress ? decodeFromBase64(adress) : "Не указано";
        };
        function openWhatsApp(id) {
    const phone = document.getElementById(id).textContent.trim();
    if (!phone || phone === "Не указано") return;

    // убираем лишние символы
    let cleaned = phone.replace(/[^\d+]/g, '');

    // если нет плюса — добавляем
    if (!cleaned.startsWith("+")) {
        cleaned = "+" + cleaned;
    }

    const whatsappUrl = `https://wa.me/${cleaned}`;
    window.location.href = whatsappUrl;
}
    </script>
</head>
<body>
    <h1>O'HA Курьер</h1>
    <div class="container">
        <div class="info">
            <strong>Номер заказа:</strong>
            <span id="decoded-order-number">Загрузка...</span>
        </div>
        <div class="info">
            <strong>Имя:</strong>
            <span id="decoded-name">Загрузка...</span>
            <button class="copy-btn" onclick="copyToClipboard('decoded-name')">📋</button>
        </div>
        <div class="info">
    <strong>Номер:</strong>
    <span id="decoded-phone">Загрузка...</span>

    <button class="call-btn" onclick="callPhone('decoded-phone')">📞</button>

    <button class="whatsapp-btn" onclick="openWhatsApp('decoded-phone')">
        🟢
    </button>

    <button class="copy-btn" onclick="copyToClipboard('decoded-phone')">📋</button>
</div>
        <div class="info">
            <strong>Адрес:</strong>
            <span id="decoded-adress">Загрузка...</span>
            <button class="copy-btn" onclick="copyToClipboard('decoded-adress')">📋</button>
        </div>
        <button class="copy-all-btn" onclick="copyAll()">Скопировать всё</button>
    </div>

    <!-- Уведомление -->
    <div id="notification" class="notification">Скопировано в буфер обмена!</div>
</body>
</html>
